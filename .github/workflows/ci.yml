name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  verify-full:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Build Rust core
        run: python dev.py build-rust

      - name: Assert Rust scheduling backend
        run: python -c "from logic import rust_bridge; assert rust_bridge.backend_name()=='rust', rust_bridge.backend_name()"

      - name: Doctor
        run: python dev.py doctor

      - name: Dependency audit
        run: python dev.py deps-audit

      - name: Ruff lint
        run: python dev.py lint

      - name: Unified full verification (check + smoke + ui-smoke)
        run: python dev.py verify --tier full

      - name: UI static review
        run: python dev.py ui-review

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t chronos-command:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: chronos-command:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  build-portable:
    runs-on: windows-latest
    needs: verify-full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -r requirements.txt -r requirements-dev.txt pyinstaller
      - run: python dev.py build-rust
      - run: python -c "from logic import rust_bridge; assert rust_bridge.backend_name()=='rust'"
      - run: python scripts/build_portable.py
      - uses: actions/upload-artifact@v4
        with:
          name: Dodgeville_PD_Portable
          path: |
            dist/Dodgeville_PD_Portable/
            dist/Dodgeville_PD_Portable_*.zip
          if-no-files-found: error
