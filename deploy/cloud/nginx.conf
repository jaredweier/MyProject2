# Chronos Command — nginx reverse proxy (TLS terminated here or at load balancer)
# Upstream: chronos container or 127.0.0.1:8080
# Place certs at /etc/nginx/certs/fullchain.pem + privkey.pem

upstream chronos_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name chronos-uat.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chronos-uat.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://chronos_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
